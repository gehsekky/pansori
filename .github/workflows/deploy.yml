name: CI / Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION:   us-east-1
  ECR_REGISTRY: 674162619498.dkr.ecr.us-east-1.amazonaws.com
  EC2_HOST:     ec2-54-87-149-6.compute-1.amazonaws.com
  EC2_USER:     ec2-user

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check backend
        run: npm run typecheck --workspace=pansori-backend
      - name: Type-check frontend
        run: npm run typecheck --workspace=pansori-frontend
      - name: Lint backend
        run: npm run lint --workspace=pansori-backend
      - name: Lint frontend
        run: npm run lint --workspace=pansori-frontend
      - name: Prettier check
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx}" --ignore-path .gitignore
      - run: npm test --workspace=src/backend

  build-and-deploy:
    name: Build → ECR → Deploy
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend
          file: ./src/backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.ECR_REGISTRY }}/pansori-backend:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./src/frontend
          file: ./src/frontend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.ECR_REGISTRY }}/pansori-frontend:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deploy is gated on the DEPLOY_ENABLED repo variable so CI stays green
      # while the EC2 instance is still being bootstrapped (TODO §1). Flip the
      # variable to 'true' under Settings → Variables → Actions once the host
      # is reachable, security group is open to GitHub Actions, and the SSH
      # key secret is set. Note: build + push to ECR still runs every push,
      # so production deploys can also be done by SSHing in manually and
      # running the script body below by hand.
      - name: Deploy to EC2
        if: vars.DEPLOY_ENABLED == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            export ECR_REGISTRY=${{ env.ECR_REGISTRY }}
            export IMAGE_TAG=${{ env.IMAGE_TAG }}
            export AWS_REGION=${{ env.AWS_REGION }}

            # Pull latest images from ECR
            aws ecr get-login-password --region $AWS_REGION \
              | docker login --username AWS --password-stdin $ECR_REGISTRY

            # Roll to new containers (postgres stays up via named volume).
            # Migrations are run by the postgres entrypoint via
            # docker-entrypoint-initdb.d on first init of the data volume.
            # Future schema changes require a separate migration runner.
            docker compose -f /opt/pansori/docker-compose.prod.yml pull backend frontend
            docker compose -f /opt/pansori/docker-compose.prod.yml up -d --remove-orphans

            # Clean up old images
            docker image prune -f
