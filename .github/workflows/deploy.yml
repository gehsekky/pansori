name: CI / Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 674162619498.dkr.ecr.us-east-1.amazonaws.com
  EC2_INSTANCE_ID: i-0cafb33230af17b59

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check backend
        run: npm run typecheck --workspace=pansori-backend
      - name: Type-check frontend
        run: npm run typecheck --workspace=pansori-frontend
      - name: Lint backend
        run: npm run lint --workspace=pansori-backend
      - name: Lint frontend
        run: npm run lint --workspace=pansori-frontend
      - name: Prettier check
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx}" --ignore-path .gitignore
      - run: npm test --workspace=src/backend

  e2e:
    name: E2E (Playwright)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # Compose env. docker-compose.yml requires GOOGLE_CLIENT_ID/SECRET to be
      # set (no defaults). The E2E suite uses /api/auth/test-login (bypass),
      # so these can be dummy values — but they must be present or passport's
      # GoogleStrategy will fail to register. E2E_TEST_LOGIN_ENABLED=true
      # exposes the bypass; double-gated against NODE_ENV=production.
      - name: Write CI env
        run: |
          cat > .env <<EOF
          GOOGLE_CLIENT_ID=ci-dummy
          GOOGLE_CLIENT_SECRET=ci-dummy
          SESSION_SECRET=ci-session-secret-do-not-use-in-prod
          E2E_TEST_LOGIN_ENABLED=true
          EOF

      - name: Bring up dev stack
        run: docker compose up -d --build

      # Backend and frontend take a few seconds to start. Poll for readiness
      # before installing Playwright so we fail fast if compose is broken.
      - name: Wait for backend ready
        run: |
          # /api/auth/me returns 401 when not authenticated — that's the
          # signal the server is up and Passport is registered.
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/auth/me || echo 000)
            if [ "$code" = "401" ]; then
              echo "backend up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "backend never came up; dumping logs"
          docker compose logs backend
          exit 1

      - name: Wait for frontend ready
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5173/ || echo 000)
            if [ "$code" = "200" ]; then
              echo "frontend up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          docker compose logs frontend
          exit 1

      - name: Install Playwright (Chromium + system deps)
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e

      # Upload diagnostics on failure: Playwright's trace + HTML report +
      # docker compose logs make post-mortem possible without re-running.
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "=== backend ===" && docker compose logs backend
          echo "=== frontend ===" && docker compose logs frontend
          echo "=== postgres ===" && docker compose logs postgres

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  build-and-deploy:
    name: Build → ECR → Deploy
    needs: [test, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend
          file: ./src/backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.ECR_REGISTRY }}/pansori-backend:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./src/frontend
          file: ./src/frontend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.ECR_REGISTRY }}/pansori-frontend:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deploy is gated on the DEPLOY_ENABLED repo variable so CI stays green
      # if the operator wants to roll new images by hand. The deploy runs over
      # SSM Session Manager — no SSH allowlist, no EC2_SSH_KEY secret, all
      # commands audited in CloudTrail. The instance role has
      # AmazonSSMManagedInstanceCore + ECR read; nothing else needed.
      - name: Deploy to EC2 (via SSM)
        if: vars.DEPLOY_ENABLED == 'true'
        env:
          INSTANCE_ID: ${{ env.EC2_INSTANCE_ID }}
        run: |
          set -euo pipefail

          # Build the script that SSM will execute on the host. The single-quoted
          # heredoc delimiter ('DEPLOY') means nothing inside is expanded by this
          # shell — all expansions happen on the EC2 host. We splice in the GH-
          # Actions env values via simple sed substitution after writing.
          cat > /tmp/deploy.sh <<'DEPLOY'
          set -e
          export ECR_REGISTRY="__ECR_REGISTRY__"
          export IMAGE_TAG="__IMAGE_TAG__"
          export AWS_REGION="__AWS_REGION__"

          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$ECR_REGISTRY"

          cd /opt/pansori
          # Persist IMAGE_TAG to .env so a host reboot recovers on the right image
          # (docker restart-policy keeps the containers, but a manual `compose up`
          # without env would otherwise fall back to :latest which doesn't exist).
          if grep -q "^IMAGE_TAG=" .env; then
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=$IMAGE_TAG|" .env
          else
            echo "IMAGE_TAG=$IMAGE_TAG" >> .env
          fi
          docker compose -f docker-compose.prod.yml --env-file .env pull backend frontend
          docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans
          docker image prune -f
          DEPLOY

          sed -i "s|__ECR_REGISTRY__|${ECR_REGISTRY}|g; s|__IMAGE_TAG__|${IMAGE_TAG}|g; s|__AWS_REGION__|${AWS_REGION}|g" /tmp/deploy.sh

          # JSON-encode the script for the SSM Parameters payload. python3 is on
          # ubuntu-latest so no external tools needed.
          PARAMS_FILE=$(mktemp)
          INSTANCE_ID="$INSTANCE_ID" python3 - "$PARAMS_FILE" <<'PY'
          import json, os, sys
          with open("/tmp/deploy.sh") as f:
              script = f.read()
          with open(sys.argv[1], "w") as f:
              json.dump({
                  "DocumentName": "AWS-RunShellScript",
                  "InstanceIds": [os.environ["INSTANCE_ID"]],
                  "Parameters": {"commands": [script]},
                  "TimeoutSeconds": 600,
              }, f)
          PY

          CMD_ID=$(aws ssm send-command --cli-input-json "file://$PARAMS_FILE" \
            --query 'Command.CommandId' --output text)
          echo "SSM command id: $CMD_ID"

          # Poll for completion (up to ~6 minutes).
          STATUS="Pending"
          for i in $(seq 1 72); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            case "$STATUS" in
              Success|Failed|TimedOut|Cancelled) break ;;
            esac
            sleep 5
          done

          echo "Final SSM status: $STATUS"
          echo "---stdout---"
          aws ssm get-command-invocation --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" --query 'StandardOutputContent' --output text
          echo "---stderr---"
          aws ssm get-command-invocation --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" --query 'StandardErrorContent' --output text

          [ "$STATUS" = "Success" ] || exit 1
