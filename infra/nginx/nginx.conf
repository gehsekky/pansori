# Pansori production Nginx config
# Assumes:
#   - Let's Encrypt certs at /etc/letsencrypt/live/pansorirpg.com/
#   - Frontend container reachable at http://frontend:80
#   - Backend container reachable at http://backend:3001
# Replace pansorirpg.com with your actual domain before deploying.

server {
    listen 80;
    server_name pansorirpg.com www.pansorirpg.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name pansorirpg.com www.pansorirpg.com;
    http2 on;

    ssl_certificate     /etc/letsencrypt/live/pansorirpg.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pansorirpg.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # API — proxy to backend container
    location /api/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Socket.io — WebSocket upgrade
    location /socket.io/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # Frontend — proxy to frontend nginx container (SPA, handles its own fallback)
    location / {
        proxy_pass       http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
