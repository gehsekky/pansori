name: pansori

services:
  postgres:
    image: postgres:16-alpine
    container_name: pansori-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pansori}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pansori}
      POSTGRES_DB: ${POSTGRES_DB:-pansori_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Mount for fresh-init only (Docker entrypoint runs these once on an
      # empty volume). The backend's migration runner re-uses the same files
      # for incremental migrations on subsequent boots.
      - ./src/backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-pansori} -d ${POSTGRES_DB:-pansori_db}']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile.dev
    container_name: pansori-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER:-pansori}:${POSTGRES_PASSWORD:-pansori}@postgres:5432/${POSTGRES_DB:-pansori_db}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3001/api/auth/google/callback}
      SESSION_SECRET: ${SESSION_SECRET:-change-me}
      # Dev-only auth bypass for Playwright E2E. The endpoint at
      # /api/auth/test-login is double-gated: this flag AND NODE_ENV!=production.
      E2E_TEST_LOGIN_ENABLED: ${E2E_TEST_LOGIN_ENABLED:-true}
    ports:
      - '3001:3001'
    volumes:
      - ./src/backend:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile.dev
    container_name: pansori-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '5173:5173'
    environment:
      # Painted art tier — set VITE_PAINTED_ART=1 in your .env (you have the
      # licensed packs); unset ⇒ free glyph/color tier (a fresh clone with no
      # painted assets). VITE_ASSET_BASE_URL optionally points painted URLs at a CDN.
      - VITE_PAINTED_ART=${VITE_PAINTED_ART:-}
      - VITE_ASSET_BASE_URL=${VITE_ASSET_BASE_URL:-}
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pansori-pgadmin
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@pansori.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '5050:80'
    profiles:
      - tools

volumes:
  postgres-data:
