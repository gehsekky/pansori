name: pansori-prod

services:
  postgres:
    image: postgres:16-alpine
    container_name: pansori-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-pansori}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-pansori_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Migrations run alphabetically by the postgres entrypoint on first init
      # of a fresh data volume only. Future schema changes after the first
      # boot need a separate runner.
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pansori} -d ${POSTGRES_DB:-pansori_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: awslogs
      options:
        awslogs-group:         /pansori/postgres
        awslogs-region:        ${AWS_REGION:-us-east-1}

  backend:
    image: ${ECR_REGISTRY}/pansori-backend:${IMAGE_TAG:-latest}
    container_name: pansori-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:              production
      PORT:                  3001
      DATABASE_URL:          postgres://${POSTGRES_USER:-pansori}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pansori_db}
      FRONTEND_URL:          ${FRONTEND_URL}
      GOOGLE_CLIENT_ID:      ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET:  ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL:   ${GOOGLE_CALLBACK_URL}
      SESSION_SECRET:        ${SESSION_SECRET}
      ANTHROPIC_API_KEY:     ${ANTHROPIC_API_KEY}
      LLM_PROVIDER:          ${LLM_PROVIDER:-none}
    expose:
      - "3001"
    logging:
      driver: awslogs
      options:
        awslogs-group:         /pansori/backend
        awslogs-region:        ${AWS_REGION:-us-east-1}

  frontend:
    image: ${ECR_REGISTRY}/pansori-frontend:${IMAGE_TAG:-latest}
    container_name: pansori-frontend
    restart: unless-stopped
    expose:
      - "80"
    logging:
      driver: awslogs
      options:
        awslogs-group:         /pansori/frontend
        awslogs-region:        ${AWS_REGION:-us-east-1}

  nginx:
    image: nginx:alpine
    container_name: pansori-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    logging:
      driver: awslogs
      options:
        awslogs-group:         /pansori/nginx
        awslogs-region:        ${AWS_REGION:-us-east-1}

volumes:
  postgres-data:
